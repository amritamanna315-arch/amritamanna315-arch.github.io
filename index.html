<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amrita Manna | Visual Artist</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d0d0d;
color:white;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
animation:fade 2s ease;
padding:20px;
}

h1{
font-size:55px;
letter-spacing:8px;
margin-bottom:10px;
}

h2{
font-weight:300;
color:#bdbdbd;
margin-bottom:25px;
}

p{
color:#8f8f8f;
margin-bottom:35px;
}

button{
padding:14px 35px;
background:white;
color:black;
border:none;
font-size:16px;
cursor:pointer;
border-radius:40px;
transition:.3s;
}

button:hover{
background:#d9d9d9;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">

<h1>AMRITA MANNA</h1>

<h2>Visual Artist • BFA Student</h2>

<p>
Minimal • Contemporary • Conceptual
</p>

<button>ENTER PORTFOLIO</button>

</div>

</body>
</html>
